user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
	worker_connections 768;
	# multi_accept on;
}

http {

	##
	# Basic Settings
	##

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	types_hash_max_size 2048;
	server_tokens off;

	# server_names_hash_bucket_size 64;
	# server_name_in_redirect off;

	include /etc/nginx/mime.types;
	default_type application/octet-stream;


	resolver 1.1.1.1 1.0.0.1 valid=300s;
	resolver_timeout 5s;
	##
	# SSL Settings
	##

	# Enable Session Resumption to improve SSL Performance.
	ssl_session_cache shared:SSL:50m;
	ssl_session_timeout 1d;
	ssl_session_tickets off;
	# Dropping SSLv3, ref: POODLE
	ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
	ssl_prefer_server_ciphers on;
	# Enable Diffie Helman Parameters for Perfect Forward Secrecy
	ssl_dhparam /etc/nginx/ssl/dhparam.pem;
	# Chosen SSL Ciphers for Compatibility and Security.
	ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
	ssl_ecdh_curve secp384r1;

	##
	# Headers
	##

	# Add Strict Transport Security to avoid SSL stripping.
	add_header Strict-Transport-Security "max-age=31536000; includeSubdomains; preload";

	# Do not render pages inside of iFrames to avoid clickjacking.
	add_header X-Frame-Options DENY;

	# Disable Content-Type sniffing in supported browsers.
	add_header X-Content-Type-Options nosniff;

	# Enable XSS Filter built into most browsers.
	add_header X-XSS-Protection "1; mode=block";

	# Disable URL indexing by crawlers (FOR DEVELOPMENT/STAGE! WILL KILL SEO!!)
	# add_header X-Robots-Tag none;
	
	# Disable the option to "open" the file when downloading.
	add_header X-Download-Options noopen;
	
	##
	# Logging Settings
	##

	access_log /var/log/nginx/access.log;
	error_log /var/log/nginx/error.log;

	##
	# Gzip Settings
	##

	gzip on;
	gzip_disable "msie6";

	gzip_vary on;
	gzip_proxied any;
	gzip_comp_level 6;
	gzip_buffers 16 8k;
	gzip_http_version 1.1;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

	##
	# Virtual Host Configs
	##

	include /etc/nginx/conf.d/*.conf;
	include /etc/nginx/sites-enabled/*;
}


